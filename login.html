<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>用户登录</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="login-container">
    <header class="login-header">
      <h1>欢迎登录</h1>
      <p>请使用您的邮箱和密码登录</p>
    </header>

    <form class="login-form" id="loginForm" novalidate>
      <div class="form-group">
        <label for="email">邮箱地址</label>
        <input type="email" id="email" name="email" placeholder="请输入邮箱" required autocomplete="email">
        <span class="error-message" id="emailError" role="alert"></span>
      </div>

      <div class="form-group">
        <label for="password">密码</label>
        <input type="password" id="password" name="password" placeholder="请输入密码" required minlength="6" maxlength="20" autocomplete="current-password">
        <span class="error-message" id="passwordError" role="alert"></span>
      </div>

      <div class="form-group">
        <div class="error-message" id="generalError" role="alert"></div>
      </div>

      <button type="submit" id="loginButton">登录</button>
    </form>

    <footer class="login-footer">
      <p>还没有账号？<a href="#">立即注册</a></p>
      <p><a href="#">忘记密码？</a></p>
    </footer>
  </main>

  <script src="scripts.js"></script>
</body>
</html>
